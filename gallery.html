<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCAM - Galeria Completa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --bg-card: rgba(17, 17, 17, 0.85);
      --bg-hover: rgba(26, 26, 26, 0.9);
      --border: rgba(34, 34, 34, 0.8);
      --border-light: rgba(42, 42, 42, 0.8);
      --text: #eaeaea;
      --text-secondary: #888888;
      --text-muted: #777777;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --twitch: #9146ff;
      --twitch-dark: #772ce8;
      --twitch-light: #a970ff;
      --radius: 8px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: #0a0a0a;
      color: var(--text);
      font-family: 'Open Sans', sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      background-image: url('assets/img/bgnew.png');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    .header {
      padding: 40px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
      justify-content: center;
    }

    .gallery-card {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
      display: block;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .gallery-card:hover {
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .gallery-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 1;
    }

    .gallery-img.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.18);
      color: var(--text-muted);
      font-size: 2rem;
    }

    .gallery-card:hover .gallery-img,
    .gallery-card:hover .gallery-img.placeholder {
      transform: scale(1.06);
    }

    .gallery-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.1) 35%, rgba(0,0,0,0.6) 100%);
      z-index: 2;
    }

    .gallery-card-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      height: 100%;
      padding: 24px;
      gap: 6px;
    }

    .gallery-title {
      font-weight: 700;
      font-size: 1.05rem;
      color: #ffffff;
      line-height: 1.2;
      text-align: left;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .gallery-date {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
      text-align: left;
    }
    .gallery-date.badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      width: auto;
      max-width: 100%;
      flex: none;
      align-self: flex-start;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .emoji-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      filter: none;
      opacity: 0.95;
    }

    .back-button {
      display: inline-block;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-bottom: 40px;
      cursor: pointer;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.32);
      transform: translateY(-2px);
    }

    .modal {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      z-index: 1000;
      padding: 50px 20px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease 0.15s, visibility 0.35s ease 0.15s;
    }

    .modal.show {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      margin: auto;
      display: block;
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.35s ease 0.2s, transform 0.35s ease 0.2s;
    }

    .modal.show .modal-content {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: #ffffff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 5px;
    }

    .modal-close:hover {
      color: #ccc;
    }

    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
      .header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBnwLlzDs363_5KBhH1iHNCHWZJa3aZGIg",
      authDomain: "rocam-55ccd.firebaseapp.com",
      databaseURL: "https://rocam-55ccd-default-rtdb.firebaseio.com",
      projectId: "rocam-55ccd",
      storageBucket: "rocam-55ccd.firebasestorage.app",
      messagingSenderId: "264193595563",
      appId: "1:264193595563:web:3d9b60f6b112f183663fee",
      measurementId: "G-8FDS6ML6VK"
    };
    firebase.initializeApp(firebaseConfig);
    console.log('✓ Firebase inicializado (gallery.html)');
  </script>
</head>
<body>
  <div class="header">
      <a href="index.html" class="back-button">← VOLTAR</a>
    <p>Todos os registros fotográficos da ROCAM</p>
  </div>

  <div class="container">
    <div class="gallery-grid" id="gallery-complete"></div>
  </div>

  <div id="modal" class="modal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modal-image">
  </div>

  <script>
    var galleryPage = 1;
    const GALLERY_PER_PAGE = 12;

    function renderGalleryGrid(galleryData, page) {
      if (typeof page === 'undefined') page = galleryPage;
      const container = document.getElementById('gallery-complete');

      if (!galleryData.length) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted);">Nenhuma foto registrada na galeria</p>';
        return;
      }

      const sorted = [...galleryData].sort((a, b) => new Date(b.date) - new Date(a.date));
      var totalPages = Math.ceil(sorted.length / GALLERY_PER_PAGE);
      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      galleryPage = page;

      var start = (page - 1) * GALLERY_PER_PAGE;
      var end = Math.min(start + GALLERY_PER_PAGE, sorted.length);
      var pageItems = sorted.slice(start, end);

      var html = pageItems.map((photo) => `
        <div class="gallery-card" ${photo.imageUrl ? `onclick="openModal('${escapeHtml(photo.imageUrl)}')"` : ''}>
          ${photo.imageUrl ? `<img class="gallery-img" src="${escapeHtml(photo.imageUrl)}" alt="${escapeHtml(photo.title || 'Foto')}" onerror="this.src='https://placehold.co/600x400/1a1a1a/555?text=Erro'">` : '<div class="gallery-img placeholder">📸</div>'}
          <div class="gallery-card-overlay"></div>
          <div class="gallery-card-content">
            <div class="gallery-title">${escapeHtml(photo.title || 'Sem título')}</div>
            <div class="gallery-date badge">${photo.date ? `<span class="emoji-icon">📅</span>${new Date(photo.date).toLocaleDateString('pt-BR')} às ${new Date(photo.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}` : ''}</div>
          </div>
        </div>
      `).join('');

      if (totalPages > 1) {
        html += '<div style="grid-column:1/-1;display:flex;justify-content:center;align-items:center;gap:8px;padding:24px 0;flex-wrap:wrap;font-family:\'Open Sans\',sans-serif;font-weight:700;font-size:11px;">';
        html += '<button onclick="goToGalleryPage(' + (page - 1) + ')" style="padding:8px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:\'Open Sans\',sans-serif;transition:all 0.2s ease;' + (page <= 1 ? 'opacity:0.3;cursor:default;' : '') + '" ' + (page <= 1 ? 'disabled' : '') + '>❮ ANTERIOR</button>';
        html += '<div style="display:flex;gap:4px;flex-wrap:wrap;">';
        for (var i = 1; i <= totalPages; i++) {
          html += '<button onclick="goToGalleryPage(' + i + ')" style="padding:8px 12px;border-radius:6px;border:1px solid ' + (i === page ? '#fff' : 'rgba(255,255,255,0.15)') + ';background:' + (i === page ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.04)') + ';color:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:\'Open Sans\',sans-serif;transition:all 0.2s ease;min-width:38px;">' + i + '</button>';
        }
        html += '</div>';
        html += '<button onclick="goToGalleryPage(' + (page + 1) + ')" style="padding:8px 16px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:\'Open Sans\',sans-serif;transition:all 0.2s ease;' + (page >= totalPages ? 'opacity:0.3;cursor:default;' : '') + '" ' + (page >= totalPages ? 'disabled' : '') + '>PRÓXIMA ❯</button>';
        html += '</div>';
      }

      container.innerHTML = html;
    }

    function goToGalleryPage(page) {
      var localData = JSON.parse(localStorage.getItem('rocam_gallery') || '[]');
      var renderPage = function(data) {
        renderGalleryGrid(data, page);
      };
      var db = firebase.database();
      db.ref('rocam-data').once('value').then(function(snapshot) {
        var firebaseRoot = snapshot.val();
        var data = [];
        if (firebaseRoot && firebaseRoot.gallery) {
          var fd = firebaseRoot.gallery;
          data = Array.isArray(fd) ? fd : (fd && typeof fd === 'object' ? Object.values(fd) : []);
        }
        if (!data.length) data = localData;
        renderPage(data);
      }).catch(function() { renderPage(localData); });
    }

    function loadGalleryData() {
      const localData = JSON.parse(localStorage.getItem('rocam_gallery') || '[]');
      const db = firebase.database();
      db.ref('rocam-data').once('value')
        .then(snapshot => {
          const firebaseRoot = snapshot.val();
          let galleryData = [];
          if (firebaseRoot && firebaseRoot.gallery) {
            const firebaseData = firebaseRoot.gallery;
            if (Array.isArray(firebaseData)) {
              galleryData = firebaseData;
            } else if (firebaseData && typeof firebaseData === 'object') {
              galleryData = Object.values(firebaseData);
            }
          }
          if (!galleryData.length) {
            galleryData = localData;
          }
          localStorage.setItem('rocam_gallery', JSON.stringify(galleryData));
          renderGalleryGrid(galleryData);
        })
        .catch(error => {
          console.warn('⚠️ Erro ao carregar galeria do Firebase:', error);
          renderGalleryGrid(localData);
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function openModal(src) {
      const modal = document.getElementById('modal');
      const modalImage = document.getElementById('modal-image');
      modalImage.style.opacity = '0';
      modalImage.src = src;
      modal.classList.add('show');
      modalImage.onload = () => {
        modalImage.style.opacity = '1';
      };
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('show');
    }

    document.getElementById('modal').addEventListener('click', function(event) {
      if (event.target === this) closeModal();
    });

    window.addEventListener('load', loadGalleryData);
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
