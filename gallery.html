<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCAM - Galeria Completa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --bg-card: rgba(17, 17, 17, 0.85);
      --bg-hover: rgba(26, 26, 26, 0.9);
      --border: rgba(34, 34, 34, 0.8);
      --border-light: rgba(42, 42, 42, 0.8);
      --text: #eaeaea;
      --text-secondary: #888888;
      --text-muted: #777777;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --twitch: #9146ff;
      --twitch-dark: #772ce8;
      --twitch-light: #a970ff;
      --radius: 8px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: #0a0a0a;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      background-image: url('https://i.ibb.co/vSM49JJ/bg.png');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    .header {
      padding: 40px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .gallery-card {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: var(--transition);
      cursor: pointer;
      background: var(--bg-card);
      display: block;
    }

    .gallery-card:hover {
      border-color: #434343;
      transform: translateY(-3px);
    }

    .gallery-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
      z-index: 1;
      will-change: transform;
    }

    .gallery-img.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.18);
      color: var(--text-muted);
      font-size: 2rem;
    }

    .gallery-card:hover .gallery-img,
    .gallery-card:hover .gallery-img.placeholder {
      transform: scale(1.07);
    }

    .gallery-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0.72) 100%);
      z-index: 2;
    }

    .gallery-card-content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      height: 100%;
      padding: 20px;
      gap: 6px;
    }

    .gallery-title {
      font-weight: 700;
      font-size: 1.05rem;
      color: #ffffff;
      line-height: 1.2;
      text-align: left;
    }

    .gallery-date {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.78);
      font-weight: 400;
      text-align: left;
    }
    .gallery-date.badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      color: #ffffff;
      font-size: 10px;
      font-weight: 400;
      width: auto;
      max-width: 100%;
      flex: none;
      align-self: flex-start;
    }

    .back-button {
      display: inline-block;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-bottom: 40px;
      cursor: pointer;
    }

    .back-button:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.32);
      transform: translateY(-2px);
    }

    .modal {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      z-index: 1000;
      padding: 50px 20px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease 0.15s, visibility 0.35s ease 0.15s;
    }

    .modal.show {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      margin: auto;
      display: block;
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.35s ease 0.2s, transform 0.35s ease 0.2s;
    }

    .modal.show .modal-content {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: #ffffff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 5px;
    }

    .modal-close:hover {
      color: #ccc;
    }

    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
      .header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCozdD373hfDCauvNX0rkMJzSgLzB-rySw",
      authDomain: "rocam-mtp.firebaseapp.com",
      databaseURL: "https://rocam-mtp-default-rtdb.firebaseio.com",
      projectId: "rocam-mtp",
      storageBucket: "rocam-mtp.firebasestorage.app",
      messagingSenderId: "737641702548",
      appId: "1:737641702548:web:013c2ca52cfffabcb8c081",
      measurementId: "G-1JTJ77R5N1"
    };
    firebase.initializeApp(firebaseConfig);
    console.log('✓ Firebase inicializado (gallery.html)');
  </script>
</head>
<body>
  <div class="header">
      <a href="index.html" class="back-button">← VOLTAR</a>
    <p>Todos os registros fotográficos da ROCAM</p>
  </div>

  <div class="container">
    <div class="gallery-grid" id="gallery-complete"></div>
  </div>

  <div id="modal" class="modal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modal-image">
  </div>

  <script>
    function renderGalleryGrid(galleryData) {
      const container = document.getElementById('gallery-complete');

      if (!galleryData.length) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted);">Nenhuma foto registrada na galeria</p>';
        return;
      }

      const sorted = [...galleryData].sort((a, b) => new Date(b.date) - new Date(a.date));
      container.innerHTML = sorted.map((photo) => `
        <div class="gallery-card" ${photo.imageUrl ? `onclick="openModal('${escapeHtml(photo.imageUrl)}')"` : ''}>
          ${photo.imageUrl ? `<img class="gallery-img" src="${escapeHtml(photo.imageUrl)}" alt="${escapeHtml(photo.title || 'Foto')}" onerror="this.src='https://placehold.co/600x400/1a1a1a/555?text=Erro'">` : '<div class="gallery-img placeholder">📸</div>'}
          <div class="gallery-card-overlay"></div>
          <div class="gallery-card-content">
            <div class="gallery-title">${escapeHtml(photo.title || 'Sem título')}</div>
            <div class="gallery-date badge">${photo.date ? new Date(photo.date).toLocaleDateString('pt-BR') : ''}</div>
          </div>
        </div>
      `).join('');
    }

    function loadGalleryData() {
      const localData = JSON.parse(localStorage.getItem('rocam_gallery') || '[]');
      const db = firebase.database();
      db.ref('rocam-data').once('value')
        .then(snapshot => {
          const firebaseRoot = snapshot.val();
          let galleryData = [];
          if (firebaseRoot && firebaseRoot.gallery) {
            const firebaseData = firebaseRoot.gallery;
            if (Array.isArray(firebaseData)) {
              galleryData = firebaseData;
            } else if (firebaseData && typeof firebaseData === 'object') {
              galleryData = Object.values(firebaseData);
            }
          }
          if (!galleryData.length) {
            galleryData = localData;
          }
          localStorage.setItem('rocam_gallery', JSON.stringify(galleryData));
          renderGalleryGrid(galleryData);
        })
        .catch(error => {
          console.warn('⚠️ Erro ao carregar galeria do Firebase:', error);
          renderGalleryGrid(localData);
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function openModal(src) {
      const modal = document.getElementById('modal');
      const modalImage = document.getElementById('modal-image');
      modalImage.style.opacity = '0';
      modalImage.src = src;
      modal.classList.add('show');
      modalImage.onload = () => {
        modalImage.style.opacity = '1';
      };
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('show');
    }

    document.getElementById('modal').addEventListener('click', function(event) {
      if (event.target === this) closeModal();
    });

    window.addEventListener('load', loadGalleryData);
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
